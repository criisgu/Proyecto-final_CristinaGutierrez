<div class="exe-text"><div class="exe-text-template">
    <p>Criterios de evaluación:</p>
<ol>
<li>Analizar y describir conceptos básicos relacionados con los seres vivos</li>
<li>Buscar y seleccionar información fiable</li>
<li>Explicar fenómenos biológicos utilizando diferentes formatos</li>
<li>Trabajar de forma cooperativa en el desarrollo de un proyecto</li>
</ol>
<p>Porcentajes:</p>
<ul>
<li>40% trabajo final</li>
<li>30% proceso</li>
<li>20% participación</li>
<li>10% uso de herramientas digitales</li>
</ul>
</div></div>
</div>
